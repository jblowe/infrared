# Example Apache vhost for an Infrared (Flask + mod_wsgi) deployment.
#
# Copy this to /etc/apache2/sites-available/<core>-infrared.conf and adjust:
#   - ServerName             the hostname for this deployment
#   - the <core> token       (3 places below) = the deployment dir AND process group
#   - INFRARED_CORE          which configs/<core>.toml profile to serve
#   - python-home            path to the virtualenv (see wsgi.instructions)
#
# Convention: clone the repo into /home/ubuntu/<core>-infrared. With that name,
# app.wsgi infers the core from the directory, so the SetEnv line is optional.
# Keep SetEnv to be explicit, or when the dir name differs from the core name
# (e.g. an mmap-sites profile served from an "mmap" directory).

<VirtualHost *:80>
  ServerName <core>-infrared.johnblowe.com
  ServerAdmin webmaster@localhost

  DocumentRoot /var/www/html

  # Which collection profile this vhost serves (configs/<core>.toml).
  SetEnv INFRARED_CORE <core>

  WSGIDaemonProcess <core>-infrared user=www-data group=www-data threads=5 \
    python-home=/home/ubuntu/venv \
    python-path=/home/ubuntu/<core>-infrared
  WSGIProcessGroup <core>-infrared
  WSGIScriptAlias / /home/ubuntu/<core>-infrared/app.wsgi

  # Pass SetEnv values through to the WSGI environ so app.wsgi can read the core.
  WSGIPassAuthorization On

  <Directory /home/ubuntu/<core>-infrared>
    Require all granted
  </Directory>

  # Let Apache serve static assets directly (faster than going through Flask).
  Alias /static /home/ubuntu/<core>-infrared/infrared/static
  <Directory /home/ubuntu/<core>-infrared/infrared/static>
    Require all granted
  </Directory>

  # Per-core image directory (matches display.image_prefix in the TOML profile).
  # Uncomment and set the prefix/path for this core to serve images via Apache.
  # Alias /<core>-images /home/ubuntu/<core>-infrared/<core>-images
  # <Directory /home/ubuntu/<core>-infrared/<core>-images>
  #   Require all granted
  # </Directory>

  ErrorLog "|/usr/bin/cronolog /var/log/apache2/<core>-infrared/%Y/%Y-%m-<core>-infrared-error.log"
  CustomLog "|/usr/bin/cronolog /var/log/apache2/<core>-infrared/%Y/%Y-%m-<core>-infrared-access.log" combined
</VirtualHost>
