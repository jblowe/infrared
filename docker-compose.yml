# Infrared container stack — generic / clean-box form (see DEPLOY.md).
#
# Caddy on :80, app, and Solr in a container. The real EC2 deployment differs
# (behind Apache on loopback, images at /mnt/images, host Solr) — those live in
# docker-compose.ec2.yml; see EC2.md.

services:
  solr:
    image: solr:9
    restart: unless-stopped
    volumes:
      - solr-data:/var/solr            # persistent cores

  web:
    build: .
    restart: unless-stopped
    environment:
      INFRARED_SITES: /app/configs/sites.toml
      INFRARED_SOLR_SERVER: http://solr:8983
    depends_on:
      - solr

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /data/images:/srv/images:ro    # one subdir per core, names match the Caddyfile
    depends_on:
      - web

volumes:
  solr-data:
