<div class="navbar bg-secondary-subtle mb-2">
  <form class="container-fluid" accept-charset="UTF-8" method="get" action="{{ url_for('catalog.search') }}">
    <div class="row w-100 px-3 align-items-center g-2">
      <div class="col-sm-2">
        <select name="search_field" class="form-select">
          <option value="text">Select…</option>
          {% for entry in collection.view('search') %}
            <option value="{{ entry.solr }}">{{ entry.label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-sm-5">
        <input name="search_value" type="text" class="form-control"
               placeholder="Enter a few keywords..." aria-label="search">
      </div>
      <div class="col-sm-1">
        <button class="btn btn-sm btn-primary form-control" type="submit">
          <span class="fas fa-search fa-lg"></span>
        </button>
      </div>
    </div>
    {# preserve the current filters and display mode across a new keyword search #}
    {% for field, value in sreq.terms %}
      <input type="hidden" name="{{ field }}" value="{{ value }}">
    {% endfor %}
    <input type="hidden" name="view" value="{{ sreq.view }}">
  </form>
</div>
