<!-- Static navbar -->
{% set nav_bg = (site.navbar_color or site.banner_color) if site else "" %}
<nav class="navbar navbar-expand-sm {{ site.navbar if site else 'navbar-light' }}"
     style="{% if nav_bg %}background-color: {{ nav_bg }};{% endif %}">
  <div class="container-fluid">
    <div class="navbar-nav align-items-center">
      <a class="navbar-brand ps-3" href="{{ url_for('catalog.search') }}">
        {% if site and site.logo %}
          <img style="max-height: 40px;" src="{{ url_for('static', filename='images/' ~ site.logo) }}"
               alt="" onerror="this.style.display='none'">
        {% endif %}
      </a>
      <a class="navbar-brand ps-3" href="{{ url_for('catalog.search') }}">{{ site.banner if site else "Infrared" }}</a>
    </div>
    <div class="navbar-nav">
      <a class="nav-link" href="{{ url_for('catalog.search') }}" title="Home">
        <span class="fas fa-home navbar-brand"></span>
      </a>
      <a class="nav-link" href="{{ url_for('catalog.about') }}" title="About">
        <span class="fas fa-info-circle navbar-brand"></span>
      </a>
    </div>
    {% if show_sidebar_toggle %}
      <div class="navbar-nav ms-auto">
        <a class="nav-item nav-link" href="#" id="toggle_sidebar">toggle sidebar</a>
      </div>
    {% endif %}
  </div>
</nav>
