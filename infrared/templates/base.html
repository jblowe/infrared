<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site.title if site else "Infrared" }}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .facet-value.active { font-weight: 600; }
    .gallery-card img, .thumb img { max-height: 120px; object-fit: contain; }
    dl.fields dt { font-weight: 600; }
    dl.fields { display: grid; grid-template-columns: max-content 1fr; gap: .15rem 1rem; }
  </style>
</head>
<body>
  {% include "components/_nav.html" %}
  <main class="container-fluid my-3">
    {% block body %}{% endblock %}
  </main>
  {% include "components/_footer.html" %}
</body>
</html>
