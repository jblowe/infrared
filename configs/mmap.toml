# Converted verbatim from config-mmap.py — review any FIXME lines.

[site]
title = "MMAP"
banner = "Middle Mekong Archaeology Project"
citation = "mmap project"
logo = "mmap-logo-pot-and-river.png"
banner_color = "#f9d88d"
secondary_color = "#002868"
navbar = "navbar-light"

[solr]
server = "http://localhost:8983"
core = "mmap-public"
facet_limit = 100
facet_mincount = 2

[display]
row_limits = [10, 20, 30]
title_field = "mmap_artifact_id_s"
image_field = "IMAGENAME_s"
image_prefix = "/mmap-images"
layouts = ["search", "facets", "list", "table", "gallery", "full"]

[views]
search = [
  { solr = "mmap_artifact_id_txt", label = "Artifact ID" },
  { solr = "site_name_txt", label = "Site Name" },
