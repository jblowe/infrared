# Infrared (containerized): proxy marc.johnblowe.com → the multi-tenant app via
# Caddy on 127.0.0.1:8081. New vhost (needs a Route 53 record).
<VirtualHost *:80>
  ServerName marc.johnblowe.com
  ServerAdmin webmaster@localhost

  ProxyPreserveHost On
  ProxyPass        / http://127.0.0.1:8081/
  ProxyPassReverse / http://127.0.0.1:8081/

  ErrorLog  "|/usr/bin/cronolog /var/log/apache2/marc/%Y/%Y-%m-marc-error.log"
  CustomLog "|/usr/bin/cronolog /var/log/apache2/marc/%Y/%Y-%m-marc-access.log" combined
</VirtualHost>
