# Infrared (containerized): proxy mmap-artifacts.johnblowe.com → the multi-tenant
# app via Caddy on 127.0.0.1:8081. New vhost (needs a Route 53 CNAME).
<VirtualHost *:80>
  ServerName mmap-artifacts.johnblowe.com
  ServerAdmin webmaster@localhost

  ProxyPreserveHost On
  ProxyPass        / http://127.0.0.1:8081/
  ProxyPassReverse / http://127.0.0.1:8081/

  ErrorLog  "|/usr/bin/cronolog /var/log/apache2/mmap-artifacts/%Y/%Y-%m-mmap-artifacts-error.log"
  CustomLog "|/usr/bin/cronolog /var/log/apache2/mmap-artifacts/%Y/%Y-%m-mmap-artifacts-access.log" combined
</VirtualHost>
