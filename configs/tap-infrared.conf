# Infrared (containerized): proxy tap-infrared.johnblowe.com → the multi-tenant
# app via Caddy on 127.0.0.1:8081. (tap.johnblowe.com stays Blacklight — see
# tap.conf — for side-by-side comparison.) Replaces the old mod_wsgi vhost.
<VirtualHost *:80>
  ServerName tap-infrared.johnblowe.com
  ServerAdmin webmaster@localhost

  ProxyPreserveHost On
  ProxyPass        / http://127.0.0.1:8081/
  ProxyPassReverse / http://127.0.0.1:8081/

  ErrorLog  "|/usr/bin/cronolog /var/log/apache2/tap-infrared/%Y/%Y-%m-tap-infrared-error.log"
  CustomLog "|/usr/bin/cronolog /var/log/apache2/tap-infrared/%Y/%Y-%m-tap-infrared-access.log" combined
</VirtualHost>
