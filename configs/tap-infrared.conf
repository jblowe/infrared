<VirtualHost *:80>
  # ServerName lb.johnblowe-aws.com
  ServerName tap-infrared.johnblowe.com
  ServerAdmin webmaster@localhost

  DocumentRoot /var/www/html

  # Which collection profile this vhost serves (configs/tap.toml).
  SetEnv INFRARED_CORE tap

  WSGIDaemonProcess tap-infrared user=www-data group=www-data threads=5 \
    python-home=/home/ubuntu/venv \
    python-path=/home/ubuntu/tap-infrared
  WSGIProcessGroup tap-infrared
  WSGIScriptAlias / /home/ubuntu/tap-infrared/app.wsgi
  WSGIPassAuthorization On

  <Directory /home/ubuntu/tap-infrared>
    Require all granted
  </Directory>

  Alias /static /home/ubuntu/tap-infrared/infrared/static
  <Directory /home/ubuntu/tap-infrared/infrared/static>
    Require all granted
  </Directory>

  ErrorLog "|/usr/bin/cronolog /var/log/apache2/tap-infrared/%Y/%Y-%m-tap-infrared-error.log"
  CustomLog "|/usr/bin/cronolog /var/log/apache2/tap-infrared/%Y/%Y-%m-tap-infrared-access.log" combined
</VirtualHost>
