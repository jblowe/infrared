<VirtualHost *:80>
  # ServerName lb.johnblowe-aws.com
  ServerName mmap-infrared.johnblowe.com
  ServerAdmin webmaster@localhost

  DocumentRoot /var/www/html

  # Which collection profile this vhost serves (configs/mmap.toml).
  SetEnv INFRARED_CORE mmap

  WSGIDaemonProcess mmap-infrared user=www-data group=www-data threads=5 \
    python-home=/home/ubuntu/venv \
    python-path=/home/ubuntu/mmap-infrared
  WSGIProcessGroup mmap-infrared
  WSGIScriptAlias / /home/ubuntu/mmap-infrared/app.wsgi
  WSGIPassAuthorization On

  <Directory /home/ubuntu/mmap-infrared>
    Require all granted
  </Directory>

  Alias /static /home/ubuntu/mmap-infrared/infrared/static
  <Directory /home/ubuntu/mmap-infrared/infrared/static>
    Require all granted
  </Directory>

  # Per-core image directory (configs/mmap.toml display.image_prefix).
  # Alias /mmap-images /home/ubuntu/mmap-infrared/mmap-images
  # <Directory /home/ubuntu/mmap-infrared/mmap-images>
  #   Require all granted
  # </Directory>

  ErrorLog "|/usr/bin/cronolog /var/log/apache2/mmap-infrared/%Y/%Y-%m-mmap-infrared-error.log"
  CustomLog "|/usr/bin/cronolog /var/log/apache2/mmap-infrared/%Y/%Y-%m-mmap-infrared-access.log" combined
</VirtualHost>
