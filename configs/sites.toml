# Host → core map for MULTI-TENANT serving (one app process serves every site).
#
# Enabled via INFRARED_SITES=configs/sites.toml (the containers set this). Each
# value needs a matching configs/<core>.toml. Single-tenant deployments ignore
# this file and use INFRARED_CORE instead.
#
# This is the generic clean-install map (primary hostnames). A specific host
# (e.g. the EC2 box, where tap.johnblowe.com stays Blacklight and the new
# infrared tap lives at tap-infrared.johnblowe.com) keeps its own variant.

# Core used when a request's Host matches nothing below (e.g. health checks).
default = "ggm"

[sites]
"ggm.johnblowe.com"            = "ggm"
"marc.johnblowe.com"           = "marc"
"mmap.johnblowe.com"           = "mmap"
"mmap-sites.johnblowe.com"     = "mmap-sites"
"mmap-artifacts.johnblowe.com" = "mmap-artifacts"
"tap.johnblowe.com"            = "tap"
"tbdb.johnblowe.com"           = "tbdb"
