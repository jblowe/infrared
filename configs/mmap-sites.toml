# Converted verbatim from config-mmap-sites.py — review any FIXME lines.

[site]
title = "MMAP"
banner = "Middle Mekong Archaeology Project"
citation = "mmap project"
logo = "mmap-logo-pot-and-river.png"
banner_color = "#f9d88d"
secondary_color = "#002868"
navbar = "navbar-light"

[solr]
server = "http://localhost:8983"
core = "mmap-sites"
facet_limit = 100
facet_mincount = 2

[display]
per_page = [100, 500, 1000]
title_field = "site_name_s"
image_field = "General_view_THUMBNAILS_ss"
image_prefix = "/mmap-images"
layouts = ["search", "facets", "list", "table", "gallery", "full"]

[views]
search = [
  { solr = "siteid_s", label = "ID" },
  { solr = "site_name_txt", label = "Site Name" },
  { solr = "site_date_s", label = "Date Discovered" },
]
facets = [
