# Infrared (containerized): proxy ggm.johnblowe.com → the multi-tenant app via
# Caddy on 127.0.0.1:8081. ProxyPreserveHost passes the Host so the app picks
# the core. Replaces the old Blacklight (Passenger) vhost.
<VirtualHost *:80>
  ServerName ggm.johnblowe.com
  ServerAdmin webmaster@localhost

  ProxyPreserveHost On
  ProxyPass        / http://127.0.0.1:8081/
  ProxyPassReverse / http://127.0.0.1:8081/

  ErrorLog  "|/usr/bin/cronolog /var/log/apache2/ggm/%Y/%Y-%m-ggm-error.log"
  CustomLog "|/usr/bin/cronolog /var/log/apache2/ggm/%Y/%Y-%m-ggm-access.log" combined
</VirtualHost>
