# Infrared (containerized): proxy tbdb.johnblowe.com → the multi-tenant app via
# Caddy on 127.0.0.1:8081. Replaces the old Blacklight (Passenger) vhost.
<VirtualHost *:80>
  ServerName tbdb.johnblowe.com
  ServerAdmin webmaster@localhost

  ProxyPreserveHost On
  ProxyPass        / http://127.0.0.1:8081/
  ProxyPassReverse / http://127.0.0.1:8081/

  ErrorLog  "|/usr/bin/cronolog /var/log/apache2/tbdb/%Y/%Y-%m-tbdb-error.log"
  CustomLog "|/usr/bin/cronolog /var/log/apache2/tbdb/%Y/%Y-%m-tbdb-access.log" combined
</VirtualHost>
