# Converted verbatim from config-tap.py — review any FIXME lines.

[site]
title = "TAP"
banner = "Thailand Archaeometallurgy Project"
citation = "Lowe, et al. 2025"
logo = "tap-logo-small.svg"
banner_color = "#A51931"
secondary_color = "#002868"
navbar = "navbar-dark"

[solr]
server = "http://localhost:8983"
core = "tap"
facet_limit = 40
facet_mincount = 1

[display]
row_limits = [10, 20, 30]
title_field = "TITLE_ss"
image_field = "THUMBNAIL_ss"
image_prefix = "/images"
layouts = ["search", "facets", "list", "table", "gallery", "full"]

[views]
search = [
  { solr = "DTYPE_ss", label = "Record types" },
  { solr = "SITE_txt", label = "Site" },
