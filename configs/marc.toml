# Converted verbatim from config-marc.py — review any FIXME lines.

[site]
title = "Blacklight MARC"
banner = "Blacklight MARC"
citation = "Lowe, et al. 2025"
logo = "icon.svg"
# Standard Bootstrap "link blue" buttons, as on the Blacklight demo. The black
# masthead is kept via navbar_color (banner_color now only themes the buttons).
banner_color = "#0d6efd"
secondary_color = "#002868"
navbar_color = "black"
navbar = "navbar-dark"

[solr]
server = "http://localhost:8983"
core = "blacklight-core"
facet_limit = 40
facet_mincount = 1

[display]
per_page = [100, 500, 1000]
title_field = "title_tsim"
image_field = "IMAGES_ss"
image_prefix = "/images"
layouts = ["search", "facets", "list", "table", "gallery", "full"]
# Sort options from the Blacklight demo controller (Relevance is the implicit
# default, offered automatically). Fields are single-valued (_si), so sortable.
sort = [
  { solr = "pub_date_si desc, title_si asc", label = "Year (newest)" },
  { solr = "author_si asc, title_si asc", label = "Author" },
  { solr = "title_si asc, pub_date_si desc", label = "Title" },
]

[views]
search = [
  { solr = "format", label = "Format" },
  { solr = "author_ssm", label = "Author" },
  { solr = "pub_date_ssim", label = "Publication Year" },
  { solr = "subject_ssim", label = "Topic" },
  { solr = "language_ssim", label = "Language" },
  { solr = "lc_1letter_ssim", label = "Call Number" },
  { solr = "subject_geo_ssim", label = "Region" },
  { solr = "subject_era_ssim", label = "Era" },
]
