# Infrared (containerized): proxy tap.johnblowe.com → the multi-tenant app via
# Caddy on 127.0.0.1:8081.
#
# NOT for immediate use. tap.johnblowe.com currently stays on Blacklight for
# side-by-side comparison; the new infrared tap is served at
# tap-infrared.johnblowe.com (see tap-infrared.conf). Enable THIS only when
# retiring Blacklight tap:
#   - a2dissite the Blacklight tap vhost on the box, a2ensite this one
#   - add "tap.johnblowe.com" = "tap" to configs/sites.ec2.toml
<VirtualHost *:80>
  ServerName tap.johnblowe.com
  ServerAdmin webmaster@localhost

  ProxyPreserveHost On
  ProxyPass        / http://127.0.0.1:8081/
  ProxyPassReverse / http://127.0.0.1:8081/

  ErrorLog  "|/usr/bin/cronolog /var/log/apache2/tap/%Y/%Y-%m-tap-error.log"
  CustomLog "|/usr/bin/cronolog /var/log/apache2/tap/%Y/%Y-%m-tap-access.log" combined
</VirtualHost>
